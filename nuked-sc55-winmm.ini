[nuked-sc55]

; Log destination:
; - console: use console output (console is allocated only when show_console=1)
; - any other value: treated as a log file path (relative to DLL directory)
log_path=console

; Only used when log_path=console:
; 1=allocate console, 0=do not allocate
show_console=0

; ROM directory (default: <DLL_DIR>\roms)
rom_dir=roms

; ROM set (default: mk2)
; Allowed: mk2, st, mk1, cm300, jv880, scb55, rlp3237, sc155, sc155mk2
romset=mk2

; Enable filename-based ROM detection (default: 1)
detect_by_filename=1

; Enable hash-based ROM detection (default: 1)
detect_by_hash=1

; System reset mode (default: 1)
; 0=NONE, 1=GS_RESET, 2=GM_RESET
system_reset=1

; Audio buffer size in frames (default: 1024, range: 256..4096)
audio_buffer_frames=1024

; NVRAM file path (optional, mainly for JV-880)
; Relative paths are resolved against DLL directory
nvram_file=
